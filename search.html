<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Database Search</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #3b82f6;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Container transitions between centered home state and top search results state */
        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        body.has-results .search-container {
            flex-grow: 0;
            padding-top: 40px;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.05em;
            transition: all 0.4s ease;
        }

        body.has-results h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .search-form {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus, .search-input:hover {
            background-color: #202124;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4), 0 1px 1px rgba(0,0,0,0.2);
        }

        .go-button {
            background-color: #303134;
            border: 1px solid transparent;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            margin: 11px 4px;
            padding: 0 16px;
            line-height: 27px;
            height: 36px;
            min-width: 54px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.1s, color 0.1s;
        }

        .go-button:hover {
            border-color: #5f6368;
            color: #fff;
        }

        /* Results container */
        .results-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 600px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .airport-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
        }

        .airport-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .airport-icao {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .airport-rwy {
            font-size: 11px;
            font-weight: 700;
            background-color: #2a2a2a;
            padding: 3px 8px;
            border-radius: 12px;
            color: var(--text-secondary);
        }

        .airport-name {
            font-size: 1rem;
            font-weight: 500;
            margin: 0;
            line-height: 1.4;
        }

        .airport-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid #2a2a2a;
            padding-top: 10px;
        }

        .spec-item strong {
            color: var(--text-primary);
        }

        .airport-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-top: auto;
            padding-top: 5px;
        }

        .tag-badge {
            color: var(--text-secondary);
            font-style: italic;
        }

        .source-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .source-text {
            color: var(--text-secondary);
        }
    </style>
</head>

    <div class="results-wrapper" id="resultsWrapper" style="display: none;">
