<!-- v0.2 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airport Database Search</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #3b82f6;
            --text-primary: #e0e0e0;
            --text-secondary: #aaa;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Smoothly slides search from center to top when results show */
        .db-status {
            margin: -0.5rem 0 1.25rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-align: center;
        }

        .db-status.warn {
            color: #f59e0b;
        }

        .search-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        body.has-results .search-container {
            flex-grow: 0;
            padding-top: 40px;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: -0.05em;
            transition: all 0.4s ease;
        }

        body.has-results h1 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .search-form {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .search-input {
            width: 100%;
            box-sizing: border-box;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 12px 20px;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: background-color 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus, .search-input:hover {
            background-color: #202124;
            border-color: transparent;
            box-shadow: 0 1px 6px rgba(0,0,0,0.4), 0 1px 1px rgba(0,0,0,0.2);
        }

        .go-button {
            background-color: #303134;
            border: 1px solid transparent;
            border-radius: 4px;
            color: #e8eaed;
            font-size: 14px;
            margin: 11px 4px;
            padding: 0 16px;
            line-height: 27px;
            height: 36px;
            min-width: 54px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.1s, color 0.1s;
        }

        .go-button:hover {
            border-color: #5f6368;
            color: #fff;
        }

        .results-wrapper {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
            box-sizing: border-box;
        }

        .results-count {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        @media (min-width: 600px) {
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .airport-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 12px;
        }

        .airport-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .airport-icao {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .airport-rwy {
            font-size: 11px;
            font-weight: 700;
            background-color: #2a2a2a;
            padding: 3px 8px;
            border-radius: 12px;
            color: var(--text-secondary);
        }

        .airport-name {
            font-size: 1rem;
            font-weight: 500;
            margin: 0;
            line-height: 1.4;
        }

        .airport-specs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid #2a2a2a;
            padding-top: 10px;
        }

        .spec-item strong {
            color: var(--text-primary);
        }

        .airport-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            margin-top: auto;
            padding-top: 5px;
        }

        .tag-badge {
            color: var(--text-secondary);
            font-style: italic;
        }

        .source-link {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .source-text {
            color: var(--text-secondary);
        }
    </style>
</head>
<body>

    <div class="search-container" id="searchContainer">
        <h1 id="mainTitle">Airport DB Search</h1>
        <p class="db-status" id="dbStatus"></p>
        <form class="search-form" id="searchForm" autocomplete="off">
            <div class="input-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by ICAO or airport name..." autofocus>
            </div>
            <button type="submit" class="go-button">Go</button>
        </form>
    </div>

    <div class="results-wrapper" id="resultsWrapper" style="display: none;">
        <div class="results-count" id="resultsCount"></div>
        <div class="results-grid" id="resultsGrid"></div>
    </div>

    <script>
        (function () {
            var APP_VERSION = "1.1.55";
            function assetUrl(path) {
                return path + (path.indexOf("?") >= 0 ? "&" : "?") + "v=" + encodeURIComponent(APP_VERSION);
            }
            [
                "airports-db-hand-crafted.js",
                "airports-db-contrail.js",
                "airports-db-flightsim-to.js",
                "airports-db-iniBuilds.js",
                "airports-db-ORBX.js",
                "airports-db-other.js",
                "airports-db-UK2000.js",
                "airports-db-gliders.js",
                "airports-db-small-detailed.js"
            ].forEach(function (file) {
                document.write('<script src="' + assetUrl(file) + '"><\/script>');
            });
        })();
    </script>

    <script>
        function mergeSeedAirportsForSearch() {
            const mainSources = [
                typeof seedHandCraftedAirportDatabase !== "undefined" ? seedHandCraftedAirportDatabase : null,
                typeof seedContrailDatabase !== "undefined" ? seedContrailDatabase : null,
                typeof seedFlightsimToDatabase !== "undefined" ? seedFlightsimToDatabase : null,
                typeof seediniBuildsDatabase !== "undefined" ? seediniBuildsDatabase : null,
                typeof seedORBXDatabase !== "undefined" ? seedORBXDatabase : null,
                typeof seedOtherAirportDatabase !== "undefined" ? seedOtherAirportDatabase : null,
                typeof seedUK2000Database !== "undefined" ? seedUK2000Database : null,
                typeof seedSmallDetailedDatabase !== "undefined" ? seedSmallDetailedDatabase : null
            ];
            const mainDB = mainSources.reduce((acc, source) => {
                if (Array.isArray(source)) acc.push(...source);
                return acc;
            }, []);
            const gliderDB = (typeof seedGliderAirportDatabase !== "undefined" && Array.isArray(seedGliderAirportDatabase))
                ? seedGliderAirportDatabase
                : [];
            return gliderDB.concat(mainDB);
        }
        const mergedAirportDatabase = mergeSeedAirportsForSearch();
        const gliderAirportCount = (typeof seedGliderAirportDatabase !== "undefined" && Array.isArray(seedGliderAirportDatabase))
            ? seedGliderAirportDatabase.length
            : 0;
        const mainAirportCount = mergedAirportDatabase.length - gliderAirportCount;

        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const resultsWrapper = document.getElementById('resultsWrapper');
        const resultsCount = document.getElementById('resultsCount');
        const resultsGrid = document.getElementById('resultsGrid');
        const dbStatus = document.getElementById('dbStatus');

        if (gliderAirportCount === 0) {
            dbStatus.textContent = mainAirportCount + ' main airports loaded — glider/small-airport database failed to load (hard refresh: Ctrl+F5).';
            dbStatus.classList.add('warn');
        } else {
            dbStatus.textContent = mainAirportCount + ' main + ' + gliderAirportCount + ' gliderports + small detailed loaded. MSFS-only codes may not appear in SimBrief.';
        }

        searchForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const query = searchInput.value.trim().toLowerCase();
            
            if (!query) {
                // If query is empty, reset back to center home look
                document.body.classList.remove('has-results');
                resultsWrapper.style.display = 'none';
                return;
            }

            const filteredAirports = mergedAirportDatabase.filter(airport => 
                airport.icao.toLowerCase().includes(query) || 
                airport.name.toLowerCase().includes(query)
            );

            // Trigger visual transitions
            document.body.classList.add('has-results');
            resultsWrapper.style.display = 'block';
            
            // Display results details
            resultsCount.textContent = `Found ${filteredAirports.length} result${filteredAirports.length === 1 ? '' : 's'}`;
            
            resultsGrid.innerHTML = '';
            filteredAirports.forEach(airport => {
                const card = document.createElement('div');
                card.className = 'airport-card';
                
                // Construct standard specifications string dynamically
                let specsHTML = `
                    <div class="spec-item"><strong>Type:</strong> ${airport.rwy || 'N/A'}</div>
                    <div class="spec-item"><strong>Length:</strong> ${airport.length ? airport.length + ' ft' : 'N/A'}</div>
                `;
                if(airport.elev !== undefined) {
                    specsHTML += `<div class="spec-item"><strong>Elev:</strong> ${airport.elev} ft</div>`;
                }
                specsHTML += `
                    <div class="spec-item"><strong>Lat:</strong> ${airport.lat}</div>
                    <div class="spec-item"><strong>Lon:</strong> ${airport.lon}</div>
                `;

                // Handle conditional external links or regular text strings
                let linkHTML = `<span class="source-text">${airport.linkText || airport.source}</span>`;
                if (airport.url) {
                    linkHTML = `<a href="${airport.url}" target="_blank" class="source-link">${airport.linkText || 'Link'}</a>`;
                }

                card.innerHTML = `
                    <div class="airport-header">
                        <span class="airport-icao">${airport.icao}</span>
                        <span class="airport-rwy">${airport.source}</span>
                    </div>
                    <p class="airport-name">${airport.name}</p>
                    <div class="airport-specs">
                        ${specsHTML}
                    </div>
                    <div class="airport-footer">
                        <span class="tag-badge">${airport.tag || ''}</span>
                        ${linkHTML}
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        });
    </script>
</body>
</html>
